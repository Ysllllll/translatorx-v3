checker:
  default_scene: translate.en.zh
  scenes:
    translate.en.zh:
      sanitize:
      - name: strip_backticks
        severity: error
      - name: trailing_annotation_strip
        severity: error
      - name: colon_to_punctuation
        severity: error
      - name: quote_strip
        severity: error
      - name: leading_punct_strip
        severity: error
      rules:
      - name: non_empty
        severity: error
      - name: length_bounds
        severity: error
      - name: length_ratio
        severity: error
        params:
          short: 4.0
          medium: 2.5
          long: 1.8
          very_long: 1.4
      - name: format_artifacts
        severity: error
        params:
          hallucination_starts:
          - - ^明白了
            - 吗
          - - ^知道了
            - 吗
          - - ^没关系
            - null
          - - ^好的[，,]
            - null
          - - ^当然[，,]
            - (了|可以|是|啦)
      - name: cjk_content
        severity: error
        params:
          target_lang: zh
      - name: trailing_annotation
        severity: error
      - name: keywords
        severity: error
        params:
          forbidden_terms:
          - 请翻译
          - 原句
          - 意译
          - 精译
          - 精翻
          - 保留原文
          - 可意译为
          - 可翻译为
          - 可精译为
          - 不客气
          - 效劳
          - 能帮到您
          - 能帮到你
          - '```'
          keyword_pairs:
          - - - translate
              - translation
              - translating
            - - 翻译
          - - - subtitle
              - subtitles
            - - 字幕
          - - - polish
              - polishing
            - - 润色
          - - - context
            - - 语境
              - 上下文
      - name: question_mark
        severity: warning
        params:
          source_marks:
          - '?'
          expected_marks:
          - ？
          - '?'
      - name: output_tokens
        severity: warning
      - name: pixel_width
        severity: warning
